apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datagate-monitoring.fullname" . }}-secret
  labels:
    {{- include "datagate-monitoring.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Override these values with --set or a values override file
  # Never commit real credentials to version control
  AIRFLOW__KEYCLOAK_CLIENT_SECRET: {{ .Values.backend.secretEnv.AIRFLOW__KEYCLOAK_CLIENT_SECRET | quote }}
  DB__PASSWORD: {{ .Values.backend.secretEnv.DB__PASSWORD | quote }}
