apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datagate-monitoring.fullname" . }}-backend
  labels:
    {{- include "datagate-monitoring.labels" . | nindent 4 }}
    {{- include "datagate-monitoring.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "datagate-monitoring.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "datagate-monitoring.backend.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.backend.env.ASPNETCORE_ENVIRONMENT | quote }}
            - name: ASPNETCORE_URLS
              value: {{ .Values.backend.env.ASPNETCORE_URLS | quote }}
            # Secrets injected from K8s secret
            - name: Airflow__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: {{ include "datagate-monitoring.fullname" . }}-secret
                  key: AIRFLOW__KEYCLOAK_CLIENT_SECRET
            - name: Database__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "datagate-monitoring.fullname" . }}-secret
                  key: DB__PASSWORD
          volumeMounts:
            - name: config
              mountPath: /app/appsettings.Production.json
              subPath: appsettings.Production.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "datagate-monitoring.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
