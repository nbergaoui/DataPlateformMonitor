{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "datagate-monitoring.fullname" . }}
  labels:
    {{- include "datagate-monitoring.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Backend API — proxied under /api
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "datagate-monitoring.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          # Frontend — catch-all for Angular SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "datagate-monitoring.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
